name: Release

# Publishes automatically when the package version changes on main:
# bump `version` in packages/react-native-quick-preview/package.json,
# update CHANGELOG.md, push — this workflow verifies, publishes to npm
# with provenance, then tags v<version> and creates a GitHub Release.
#
# Requires the NPM_TOKEN repository secret (npm automation token).
# Can also be run manually from the Actions tab (with an optional dry run).

on:
  push:
    branches: [main]
    paths:
      - 'packages/react-native-quick-preview/package.json'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip npm publish and release creation)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write # npm provenance

concurrency: release

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./packages/react-native-quick-preview/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if this version is already published
        id: check
        run: |
          PUBLISHED=$(npm view react-native-quick-preview@${{ steps.pkg.outputs.version }} version 2>/dev/null || echo "none")
          if [ "$PUBLISHED" = "${{ steps.pkg.outputs.version }}" ]; then
            echo "Version ${{ steps.pkg.outputs.version }} is already on npm — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Type check
        if: steps.check.outputs.skip != 'true'
        run: npm run type-check

      - name: Lint
        if: steps.check.outputs.skip != 'true'
        run: npm run lint

      - name: Test
        if: steps.check.outputs.skip != 'true'
        run: npm test

      - name: Build library
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Publish to npm (with provenance)
        if: steps.check.outputs.skip != 'true' && !inputs.dry-run
        run: npm publish --provenance --access public --workspace packages/react-native-quick-preview
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create tag and GitHub Release
        if: steps.check.outputs.skip != 'true' && !inputs.dry-run
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
