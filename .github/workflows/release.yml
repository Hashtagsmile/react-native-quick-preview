name: Release

# Manual release: run this workflow from the Actions tab once NPM_TOKEN is set
# in the repository secrets (npm automation token). It verifies the package,
# publishes to npm with provenance, then tags and creates a GitHub Release.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip npm publish and release creation)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write # npm provenance

concurrency: release

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build library
        run: npm run build

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./packages/react-native-quick-preview/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.pkg.outputs.version }} already exists — bump the package version first."
            exit 1
          fi

      - name: Publish to npm (with provenance)
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance --access public --workspace packages/react-native-quick-preview
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create tag and GitHub Release
        if: ${{ !inputs.dry-run }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
