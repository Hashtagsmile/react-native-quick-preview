name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build library
        run: npm run build

      - name: Verify build output
        run: |
          test -f packages/react-native-quick-preview/dist/index.js
          test -f packages/react-native-quick-preview/dist/index.mjs
          test -f packages/react-native-quick-preview/dist/index.d.ts

      - name: Check publish contents
        run: npm pack --dry-run --workspace packages/react-native-quick-preview
